name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate addon
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate addon metadata
        shell: pwsh
        run: ./scripts/validate-addon.ps1

      - name: Install Lua tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Check Lua syntax
        shell: bash
        run: find CraftOrdersHelper -name '*.lua' -print0 | xargs -0 -n1 luac5.1 -p

      - name: Lint Lua
        run: luacheck CraftOrdersHelper

      - name: Package smoke test
        uses: BigWigsMods/packager@v2
        with:
          args: -d

  release:
    name: Package and publish
    runs-on: ubuntu-latest
    needs: validate
    env:
      CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID || secrets.CURSEFORGE_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check publishing configuration
        shell: bash
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          if [ -z "$CF_API_KEY" ]; then
            echo "::error::Missing GitHub secret CF_API_KEY."
            exit 1
          fi
          if [ -z "$CURSEFORGE_PROJECT_ID" ]; then
            echo "::error::Missing GitHub Actions repository variable or secret CURSEFORGE_PROJECT_ID."
            exit 1
          fi

      - name: Package and publish
        uses: BigWigsMods/packager@v2
        with:
          args: -p ${{ env.CURSEFORGE_PROJECT_ID }}
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
