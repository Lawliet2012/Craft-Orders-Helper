name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate addon
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate addon metadata
        shell: pwsh
        run: ./scripts/validate-addon.ps1

      - name: Install Lua tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Check Lua syntax
        shell: bash
        run: find CraftOrdersHelper -name '*.lua' -print0 | xargs -0 -n1 luac5.1 -p

      - name: Lint Lua
        run: luacheck CraftOrdersHelper

      - name: Package smoke test
        uses: BigWigsMods/packager@v2
        with:
          args: -d
